name: Auto PR Feature to Master

on:
  push:
    branches:
      - 'feature/*'
      - 'devin/*'

permissions:
  contents: write
  pull-requests: write

jobs:
  build-project:
    name: 'Build Project'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
    
      - name: Set up Dotnet
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: '10.0.x'
          
      - name: Clean
        run: dotnet clean --configuration Release
    
      - name: Build
        run: dotnet build --configuration Release
        
  test-project:
    name: 'Test Project'
    runs-on: ubuntu-latest
    needs: build-project
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Dotnet
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: '10.0.x'

      - name: Test
        run: dotnet test --configuration Release --collect:"XPlat Code Coverage"

  create-pull-request-master:
    name: 'Create Pull Request'
    runs-on: ubuntu-latest
    needs: [build-project, test-project]
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Create PR to Master
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Create PR if it not exists
          PR_EXISTS=$(gh pr list --head "${{ github.ref_name }}" --base master --json number -q '.[0].number')
          
          if [ -z "$PR_EXISTS" ]; then
            gh pr create \
              --head "${{ github.ref_name }}" \
              --base master \
              --title "Automated PR ${{ github.ref_name }} into Master" \
              --body ""
          else
            echo "PR already exists for this branch. Skipping."
          fi